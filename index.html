<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GTM Strategy Heatmap & Account Explorer</title>

    <!-- Tailwind CSS for styling -->

    <script src="https://cdn.tailwindcss.com"></script>

    

    <style>

        [x-cloak] { display: none !important; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }

        ::-webkit-scrollbar-track { background: #f1f1f1; }

        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .sticky-col { position: sticky; left: 0; background-color: white; z-index: 10; border-right: 2px solid #e2e8f0; }

        .sticky-header { position: sticky; top: 0; z-index: 20; }

    </style>



    <script>

        // Register Alpine data component before Alpine loads

        document.addEventListener('alpine:init', () => {

            Alpine.data('heatmapApp', () => ({

                tiers: ['Tier 1', 'Tier 2', 'Tier 3'],

                catalysts: [

                    { name: 'Funding Round', icon: '💰' },

                    { name: 'M&A', icon: '🤝' },

                    { name: 'IPO Readiness', icon: '📈' },

                    { name: 'New Products', icon: '✨' }

                ],

                lostCategories: [4, 3, 2, 1, 0],

                statuses: [

                    { label: 'Crushing', icon: '😋', color: 'text-yellow-500' },

                    { label: 'Crashing', icon: '🚨', color: 'text-red-500' },

                    { label: 'Dominating', icon: '😈', color: 'text-purple-500' },

                    { label: 'Thriving', icon: '😎', color: 'text-orange-400' },

                    { label: 'Surviving', icon: '😐', color: 'text-green-500' }

                ],

                data: {},

                modalOpen: false,

                selectedData: { accounts: [], status: {} },



                init() {

                    this.refreshData();

                },



                refreshData() {

                    const newData = {};

                    this.tiers.forEach(t => {

                        this.catalysts.forEach(c => {

                            this.lostCategories.forEach(l => {

                                this.statuses.forEach(s => {

                                    const key = `${t}-${c.name}-${l}-${s.label}`;

                                    const rand = Math.random();

                                    const count = rand > 0.88 ? Math.floor(Math.random() * 5) + 1 : 0;

                                    newData[key] = {

                                        count,

                                        accounts: this.generateMockAccounts(count)

                                    };

                                });

                            });

                        });

                    });

                    this.data = newData;

                },



                generateMockAccounts(count) {

                    const industries = ['SaaS', 'FinTech', 'DevOps', 'HealthCare', 'Security'];

                    const techs = ['React', 'Snowflake', 'AWS', 'Salesforce', 'HubSpot', 'Postgres'];

                    return Array.from({ length: count }, (_, i) => ({

                        id: Math.random(),

                        name: `Company ${['Delta', 'Prime', 'Zenith', 'Nebula'][Math.floor(Math.random()*4)]} ${Math.floor(Math.random()*100)}`,

                        industry: industries[Math.floor(Math.random()*industries.length)],

                        website: 'www.gtm-intel.io',

                        linkedin: '#',

                        techStack: techs.sort(() => 0.5 - Math.random()).slice(0, 3)

                    }));

                },



                getCount(t, c, l, s) {

                    return this.data[`${t}-${c}-${l}-${s}`]?.count || 0;

                },



                getCellClass(t, c, l, s) {

                    const val = this.getCount(t, c, l, s);

                    if (val === 0) return 'bg-white hover:bg-gray-50 cursor-default';

                    if (val >= 3) return 'bg-green-400 text-green-900 font-bold cursor-pointer hover:bg-green-500 shadow-inner';

                    return 'bg-orange-200 text-orange-900 cursor-pointer hover:bg-orange-300 shadow-inner';

                },



                openModal(tier, catalyst, lost, status) {

                    const cell = this.data[`${tier}-${catalyst}-${lost}-${status.label}`];

                    if (cell && cell.count > 0) {

                        this.selectedData = {

                            ...cell,

                            tier,

                            catalyst,

                            lost,

                            status

                        };

                        this.modalOpen = true;

                    }

                }

            }));

        });

    </script>

    

    <!-- Alpine.js with defer for proper initialization order -->

    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</head>

<body class="bg-gray-50 font-sans text-gray-900" x-data="heatmapApp">



    <div class="min-h-screen p-4 md:p-8">

        <div class="max-w-[1600px] mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">

            

            <!-- Header -->

            <div class="px-6 py-4 border-b border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4 bg-gray-50/50">

                <div>

                    <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">

                        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>

                        GTM Catalyst Analysis Heatmap

                    </h1>

                    <p class="text-sm text-gray-500">View performance across GTM Tiers and Catalyst Research</p>

                </div>

                <button @click="refreshData()" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium shadow-sm">

                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>

                    Refresh Data

                </button>

            </div>



            <!-- Heatmap Table -->

            <div class="overflow-x-auto">

                <table class="w-full border-collapse text-xs">

                    <thead>

                        <tr class="bg-gray-100">

                            <th colspan="2" class="border border-gray-300 p-2 text-left bg-white font-bold w-48 sticky-col"># Closed-Lost Opps</th>

                            <template x-for="lost in lostCategories" :key="lost">

                                <th :colspan="statuses.length" class="border border-gray-300 p-2 text-left bg-gray-100 text-gray-600" x-text="lost"></th>

                            </template>

                        </tr>

                        <tr class="bg-white">

                            <th colspan="2" class="border border-gray-300 p-2 text-left font-bold text-blue-600 sticky-col">Growth vs Decline</th>

                            <template x-for="lost in lostCategories" :key="'status-header-' + lost">

                                <template x-for="status in statuses" :key="'status-' + lost + '-' + status.label">

                                    <th class="border border-gray-300 p-1 text-center min-w-[65px]">

                                        <div :class="status.color" x-text="status.icon"></div>

                                        <div class="text-[9px] uppercase tracking-tighter text-gray-400" x-text="status.label"></div>

                                    </th>

                                </template>

                            </template>

                        </tr>

                        <tr class="bg-gray-50 text-[10px] text-gray-400 font-normal">

                            <th class="border border-gray-300 p-2 text-left w-24 sticky-col">Tier</th>

                            <th class="border border-gray-300 p-2 text-left w-40 sticky-col" style="left: 6rem;">Catalyst</th>

                            <template x-for="i in (lostCategories.length * statuses.length)" :key="'count-' + i">

                                <th class="border border-gray-300 p-1">Count</th>

                            </template>

                        </tr>

                    </thead>

                    <tbody>

                        <template x-for="(tier, tIdx) in tiers" :key="'tier-' + tier">

                            <template x-for="(catalyst, cIdx) in catalysts" :key="'cat-' + tier + '-' + catalyst.name">

                                <tr class="hover:bg-blue-50/30 transition-colors">

                                    <!-- Tier Column (Rowspan) -->

                                    <template x-if="cIdx === 0">

                                        <td :rowspan="catalysts.length" class="border border-gray-300 p-3 font-bold text-gray-700 align-middle text-center sticky-col">

                                            <div class="flex flex-col items-center gap-1">

                                                <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

                                                <span x-text="tier"></span>

                                            </div>

                                        </td>

                                    </template>

                                    

                                    <td class="border border-gray-300 p-2 bg-white flex items-center gap-2 font-medium text-gray-600 sticky-col" style="left: 6rem;">

                                        <span class="text-base" x-text="catalyst.icon"></span>

                                        <span x-text="catalyst.name"></span>

                                    </td>



                                    <template x-for="lost in lostCategories" :key="'lost-col-' + lost">

                                        <template x-for="status in statuses" :key="'status-col-' + lost + '-' + status.label">

                                            <td 

                                                @click="openModal(tier, catalyst.name, lost, status)"

                                                :class="getCellClass(tier, catalyst.name, lost, status.label)"

                                                class="border border-gray-300 p-2 text-center transition-all"

                                                x-text="getCount(tier, catalyst.name, lost, status.label)"

                                            ></td>

                                        </template>

                                    </template>

                                </tr>

                            </template>

                        </template>

                    </tbody>

                </table>

            </div>



            <!-- Legend -->

            <div class="p-6 border-t border-gray-100 flex flex-wrap gap-6 items-center bg-gray-50/50">

                <div class="flex items-center gap-2">

                    <div class="w-4 h-4 bg-green-400 rounded border border-green-500 shadow-sm"></div>

                    <span class="text-sm text-gray-600 font-medium">High Volume (3+)</span>

                </div>

                <div class="flex items-center gap-2">

                    <div class="w-4 h-4 bg-orange-200 rounded border border-orange-300 shadow-sm"></div>

                    <span class="text-sm text-gray-600 font-medium">Moderate (1-2)</span>

                </div>

                <div class="flex items-center gap-2">

                    <div class="w-4 h-4 bg-white rounded border border-gray-300 shadow-sm"></div>

                    <span class="text-sm text-gray-600 font-medium">Zero activity</span>

                </div>

                <div class="ml-auto text-[10px] text-gray-400 italic">

                    * Click any colored cell to explore the account list

                </div>

            </div>

        </div>

    </div>



    <!-- Modal Background -->

    <div x-show="modalOpen" 

         x-cloak

         x-transition:enter="transition ease-out duration-300"

         x-transition:enter-start="opacity-0"

         x-transition:enter-end="opacity-100"

         x-transition:leave="transition ease-in duration-200"

         x-transition:leave-start="opacity-100"

         x-transition:leave-end="opacity-0"

         class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">

        

        <!-- Modal Content -->

        <div @click.away="modalOpen = false" 

             class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden border border-gray-200">

            

            <div class="p-6 border-b border-gray-100 flex justify-between items-start bg-gray-50/80">

                <div>

                    <h2 class="text-xl font-bold text-gray-900 flex items-center gap-2">

                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-7h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>

                        Account Context

                    </h2>

                    <div class="mt-2 flex flex-wrap gap-2 text-[10px]">

                        <span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded-full font-bold" x-text="selectedData.tier"></span>

                        <span class="px-2 py-0.5 bg-purple-100 text-purple-700 rounded-full font-bold" x-text="selectedData.catalyst"></span>

                        <span class="px-2 py-0.5 bg-gray-200 text-gray-700 rounded-full font-bold"><span x-text="selectedData.lost"></span> Lost Opps</span>

                        <span class="px-2 py-0.5 bg-yellow-100 text-yellow-800 rounded-full font-bold">

                            <span x-text="selectedData.status?.label"></span> <span x-text="selectedData.status?.icon"></span>

                        </span>

                    </div>

                </div>

                <button @click="modalOpen = false" class="p-2 hover:bg-gray-200 rounded-full transition-colors text-gray-400">

                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 18"></path></svg>

                </button>

            </div>

            

            <div class="flex-1 overflow-y-auto p-6 space-y-4">

                <template x-for="account in selectedData.accounts" :key="account.id">

                    <div class="p-4 rounded-xl border border-gray-100 bg-white hover:border-blue-200 hover:shadow-md transition-all group">

                        <div class="flex justify-between items-start">

                            <div>

                                <h3 class="font-bold text-gray-900 text-lg group-hover:text-blue-600 transition-colors" x-text="account.name"></h3>

                                <p class="text-sm text-gray-500 flex items-center gap-1 mt-0.5">

                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9h18"></path></svg>

                                    <span x-text="account.industry"></span> • <span x-text="account.website"></span>

                                </p>

                            </div>

                            <div class="flex gap-2">

                                <a :href="account.linkedin" target="_blank" class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all">

                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>

                                </a>

                            </div>

                        </div>

                        <div class="mt-4 pt-4 border-t border-gray-50">

                            <div class="flex flex-wrap gap-2">

                                <template x-for="tech in account.techStack" :key="tech">

                                    <span class="px-2 py-1 bg-gray-100 text-gray-600 text-[10px] font-medium rounded border border-gray-200 shadow-sm" x-text="tech"></span>

                                </template>

                            </div>

                        </div>

                    </div>

                </template>

            </div>



            <div class="p-4 border-t border-gray-100 bg-gray-50 text-right">

                <button @click="modalOpen = false" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-100 shadow-sm">

                    Close Explorer

                </button>

            </div>

        </div>

    </div>

</body>

</html>
